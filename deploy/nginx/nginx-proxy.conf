upstream djangoapp {
    server web:8000;
}

server {
    listen 8080;
    server_name ${SERVER_NAMES};

    location /static {
        alias /staticfiles;
    }

    location /media {
        alias /mediafiles;
    }

    location / {
        proxy_pass http://djangoapp/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
