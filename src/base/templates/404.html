{% load i18n %}

<c-base>
    <section id="not-found"
             class="min-h-screen bg-linear-to-br from-base-300 via-base-300 to-base-200 flex items-center justify-center">
        <div class="flex flex-col items-center text-center gap-6 px-6 py-16">
            <div class="flex items-center gap-3">
                <div class="h-0.5 w-8 rounded-full bg-primary">
                </div>
                <span class="text-xs font-mono uppercase tracking-[0.18em] text-primary/60">404</span>
                <div class="h-0.5 w-8 rounded-full bg-primary">
                </div>
            </div>
            <h1 id="not-found-title"
                class="text-3xl sm:text-4xl font-bold tracking-tight text-base-content">
                {% translate "Page not found" %}
            </h1>
            <p id="not-found-description"
               class="text-base-content/65 max-w-xl leading-relaxed">
                {% translate "The page you are looking for does not exist or has been moved." %}
            </p>
            <a href="{% url 'home' %}" class="btn btn-primary">
                {% translate "Go back home" %}
            </a>
        </div>
    </section>
</c-base>
