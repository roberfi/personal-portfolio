{% load base_tags %}
{% load cooco %}

{% get_google_analytics as analytics %}
{% if analytics.use_analytics %}
    <!-- Google Analytics consent default (must run before GA loads) -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        gtag("consent", "default", {
            "analytics_storage": {% if cooco_manager|is_cookie_group_accepted:analytics.cookie_consent %}"granted"{% else %}"denied"{% endif%}
        });
    </script>

    <!-- Google tag (gtag.js) — deferred until after load to avoid competing with LCP -->
    <script>
        window.addEventListener("load", function() {
            var s = document.createElement("script");
            s.src = "https://www.googletagmanager.com/gtag/js?id={{ analytics.gtag }}";
            s.async = true;
            document.head.appendChild(s);
            gtag("js", new Date());
            gtag("config", "{{ analytics.gtag }}"{% if analytics.debug_mode %}, {"debug_mode": true}{% endif %});
        });
    </script>
{% endif %}
