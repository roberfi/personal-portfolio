{% load i18n %}
{% load cooco %}

{% get_cooco_banner_config as banner %}
{% if banner.show_banner %}
    <div id="cooco_banner"
         class="fixed bottom-4 left-4 right-4 sm:left-auto sm:right-8 sm:max-w-sm z-50">
        <div role="alert"
             class="card bg-base-100 border border-primary/20 shadow-2xl shadow-black/70">
            <div class="card-body p-4 gap-4">

                <div>
                    <p class="font-semibold text-sm text-base-content">
                        {{ banner.title }}
                    </p>
                    <p class="text-xs text-base-content/70 mt-1">
                        {{ banner.text }}
                    </p>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <c-cookie-consent-banner.buttons.reject-button />
                    <c-cookie-consent-banner.buttons.accept-button />
                </div>

                {% get_cookie_groups as cookie_groups %}
                {% if cookie_groups|any_optional_cookie_group %}
                    <c-cookie-consent-banner.buttons.settings-button />
                {% endif %}

            </div>
        </div>
    </div>
    <c-cookie-consent-banner.modal />
{% endif %}
