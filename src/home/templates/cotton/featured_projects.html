{% load i18n %}

{% if featured_projects %}
    <section id="featured-projects"
             class="bg-linear-to-br from-base-300 via-base-300 to-base-200 border-t border-primary/15">
        <div class="max-w-(--breakpoint-lg) mx-auto px-6 py-16 lg:py-24">

            {# ── Section header ── #}
            <div class="flex flex-col items-center text-center gap-4 mb-12 lg:mb-16">
                <div class="flex items-center gap-3">
                    <div class="h-0.5 w-8 rounded-full bg-primary">
                    </div>
                    <span class="text-xs font-mono uppercase tracking-[0.18em] text-primary/60">
                        {% translate "My work" %}
                    </span>
                    <div class="h-0.5 w-8 rounded-full bg-primary">
                    </div>
                </div>
                <h2 id="featured-projects-title"
                    class="text-3xl sm:text-4xl font-bold tracking-tight text-base-content">
                    {% translate "Featured projects" %}
                </h2>
            </div>

            {# ── Grid ── #}
            <div id="featured-projects-grid"
                 class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
                {% for project in featured_projects %}
                    <c-project-card :project="project" />
                {% endfor %}
            </div>

            {# ── CTA ── #}
            <div class="flex justify-center mt-12">
                <a id="featured-projects-see-all"
                   href="{% url 'projects' %}"
                   class="btn btn-outline btn-primary gap-2 group">
                    {% translate "See all projects" %}
                    <c-arrow-right-icon />
                </a>
            </div>

        </div>
    </section>
{% endif %}
