{% load i18n %}

{% if services %}
    <section id="services"
             class="bg-linear-to-br from-base-200 via-base-300 to-base-300 border-t border-primary/15">
        <div class="max-w-(--breakpoint-lg) mx-auto px-6 py-16 lg:py-24">

            {# ── Section header ── #}
            <div class="flex flex-col items-center text-center gap-4 mb-12 lg:mb-16">
                <div class="flex items-center gap-3">
                    <div class="h-0.5 w-8 rounded-full bg-primary">
                    </div>
                    <span class="text-xs font-mono uppercase tracking-[0.18em] text-primary/60">
                        {% translate "What I can do for you" %}
                    </span>
                    <div class="h-0.5 w-8 rounded-full bg-primary">
                    </div>
                </div>
                <h2 id="services-title"
                    class="text-3xl sm:text-4xl font-bold tracking-tight text-base-content">
                    {% translate "Services" %}
                </h2>
            </div>

            {# ── Grid ── #}
            <div id="services-grid" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
                {% for service in services %}
                    <c-service-card :service="service" />
                {% endfor %}
            </div>

        </div>
    </section>
{% endif %}
