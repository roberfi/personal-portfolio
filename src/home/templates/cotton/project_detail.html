{% load i18n %}
{% load filters %}

<div class="mt-10 flex flex-col gap-10">

    {# ── Problem ── #}
    <div class="card bg-base-200/60 rounded-2xl shadow-xl shadow-black/20 border border-primary/15">
        <div class="card-body gap-3">
            <div class="flex items-center gap-3">
                <div class="shrink-0 flex items-center justify-center w-10 h-10 rounded-xl border border-primary/20 bg-primary/5">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5 text-primary"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-primary">
                    {% translate "The Problem" %}
                </h2>
            </div>
            <div id="project-detail-problem"
                 class="prose max-w-none prose-headings:text-base-content prose-a:text-primary">
                {{ project.problem|md }}
            </div>
        </div>
    </div>

    {# ── Approach ── #}
    <div class="card bg-base-200/60 rounded-2xl shadow-xl shadow-black/20 border border-secondary/15">
        <div class="card-body gap-3">
            <div class="flex items-center gap-3">
                <div class="shrink-0 flex items-center justify-center w-10 h-10 rounded-xl border border-secondary/20 bg-secondary/5">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5 text-secondary"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-secondary">
                    {% translate "The Approach" %}
                </h2>
            </div>
            <div id="project-detail-approach"
                 class="prose max-w-none prose-headings:text-base-content prose-a:text-primary">
                {{ project.approach|md }}
            </div>
        </div>
    </div>

    {# ── Outcome ── #}
    <div class="card bg-base-200/60 rounded-2xl shadow-xl shadow-black/20 border border-success/15">
        <div class="card-body gap-3">
            <div class="flex items-center gap-3">
                <div class="shrink-0 flex items-center justify-center w-10 h-10 rounded-xl border border-success/20 bg-success/5">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5 text-success"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-success">
                    {% translate "The Outcome" %}
                </h2>
            </div>
            <div id="project-detail-outcome"
                 class="prose max-w-none prose-headings:text-base-content prose-a:text-primary">
                {{ project.outcome|md }}
            </div>
        </div>
    </div>

</div>
