{% load i18n %}
{% load static %}
{% get_current_language as LANGUAGE_CODE %}

<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="portfolio">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow">
        <meta name="description"
              content="{% translate "The site is temporarily down for maintenance. It will be back shortly." %}">
        <meta name="keywords" content="">
        <title>{% translate "Under maintenance" %}</title>
        <link rel="stylesheet" href="{% static 'bundle.css' %}">
    </head>
    <body class="overflow-hidden">
        <div class="flex flex-col h-dvh w-screen">
            <section id="maintenance"
                     class="min-h-screen bg-linear-to-br from-base-300 via-base-300 to-base-200 flex items-center justify-center">
                <div class="flex flex-col items-center text-center gap-6 px-6 py-16">

                    <div class="w-16 h-16 rounded-2xl border border-primary/20 bg-primary/5 flex items-center justify-center text-primary">
                        <svg xmlns="http://www.w3.org/2000/svg"
                             class="w-8 h-8"
                             aria-hidden="true"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke-width="1.5"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z" />
                        </svg>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="h-0.5 w-8 rounded-full bg-primary">
                        </div>
                        <span class="text-xs font-mono uppercase tracking-[0.18em] text-primary/60">503</span>
                        <div class="h-0.5 w-8 rounded-full bg-primary">
                        </div>
                    </div>
                    <h1 id="maintenance-title"
                        class="text-3xl sm:text-4xl font-bold tracking-tight text-base-content">
                        {% translate "Under maintenance" %}
                    </h1>
                    <p id="maintenance-description"
                       class="text-base-content/65 max-w-xl leading-relaxed">
                        {% translate "The site is temporarily down for maintenance. It will be back shortly." %}
                    </p>
                </div>
            </section>
        </div>
    </body>
</html>
