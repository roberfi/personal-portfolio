<div class="sticky top-0 z-10 bg-base-300/80 backdrop-blur-md border-b border-{{ color|default:"primary" }}/15 py-5 mb-10 -mx-5 px-5">
    <div class="flex items-center gap-4">
        <div class="shrink-0 flex items-center justify-center w-12 h-12 rounded-xl border border-{{ color|default:"primary" }}/20 bg-{{ color|default:"primary" }}/5">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-6 w-6 text-{{ color|default:"primary" }}"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="{{ icon_path }}" />
            </svg>
        </div>
        <div class="flex flex-col gap-1.5">
            {% if eyebrow %}
                <span class="text-xs font-mono uppercase tracking-[0.18em] text-{{ color|default:"primary" }}/60 leading-none">
                    {{ eyebrow }}
                </span>
            {% endif %}
            <h1 id="{{ id_prefix }}-title"
                class="text-3xl sm:text-4xl font-bold text-base-content tracking-tight leading-none">
                {{ title }}
            </h1>
        </div>
    </div>
</div>
